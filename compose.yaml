volumes:
  pgdata:
services:
  db:
    image: timescale/timescaledb:2.27.2-pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-marketiq}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketiq} -d ${POSTGRES_DB:-marketiq}"]
      interval: 5s
      timeout: 3s
      retries: 5
