# github ci
name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          enable-cache: 'true'
      - name: Install dependencies
        run: |
          uv sync --frozen
      - name: Run the gate
        run: |
          uv gate
